<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ALGOPOLIS — Your algorithms govern the city</title>
<link rel="icon" href="./assets/icon.png">
<style>
  :root{
    --bg:#0e1422; --panel:#161f33; --panel2:#1d2942; --line:#2c3a57;
    --ink:#e8edf6; --dim:#9fb0cc; --slate:#7e93b8;
    --amber:#f2b24c; --teal:#3fe0d0; --teal-dim:#1d8c84;
    --eff:#3fe0d0; --wel:#6fd08a; --fair:#f2b24c; --trust:#5aa9ef; --trans:#b98cf0; --unrest:#ff7a59;
    --bad:#ff6b6b;
    --btn:#1b2740; --btnon:#173433;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:"Segoe UI",system-ui,-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;overflow:hidden}
  #app{display:flex;flex-direction:column;height:100%}
  header{display:flex;align-items:center;gap:9px;padding:8px 14px;border-bottom:1px solid var(--teal-dim);
    background:linear-gradient(180deg,#1a2740,#111a2c);box-shadow:0 2px 12px rgba(0,0,0,.4);flex:none;flex-wrap:wrap}
  .brand{font-weight:800;letter-spacing:2px;font-size:18px}.brand b{color:var(--teal)}
  .hgrow{flex:1}
  .res{display:flex;align-items:center;gap:5px;background:#0d1626;border:1px solid var(--line);border-radius:999px;padding:4px 10px 4px 5px;font-size:12.5px;font-variant-numeric:tabular-nums}
  .res img{width:18px;height:18px;object-fit:contain}
  .res b{color:var(--ink)} .res.unrest b{color:var(--unrest)}
  .pill{background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:5px 10px;font-size:12px;color:var(--dim);white-space:nowrap}
  .pill b{color:var(--ink)}
  main{flex:1;display:flex;min-height:0}
  #stage{position:relative;flex:1;min-width:0;overflow:hidden}
  #bg3d{position:absolute;inset:0;z-index:0;background:#0c111d url("./assets/bg_city.png") center/cover no-repeat;filter:blur(11px) brightness(.46) saturate(.9);transform:scale(1.08)}
  #bg3d::after{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 50% 42%,rgba(0,0,0,0) 40%,rgba(6,10,18,.6) 100%)}
  canvas#c{position:relative;z-index:1;display:block;width:100%;height:100%;touch-action:none;cursor:grab}
  canvas#c:active{cursor:grabbing}
  #miniWrap,.eralabel,#cam3d,#dev{z-index:3}
  #cam3d{position:absolute;left:12px;top:12px;display:flex;gap:5px;z-index:3}
  #cam3d button{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:rgba(18,26,44,.82);color:var(--ink);font-size:15px;cursor:pointer;backdrop-filter:blur(3px);transition:.12s;line-height:1}
  #cam3d button:hover{border-color:var(--teal);color:var(--teal);background:rgba(27,42,68,.9)}
  #dev{position:absolute;top:6px;left:8px;color:#0f0;font:12px monospace;display:none}
  .eralabel{position:absolute;left:12px;bottom:12px;background:rgba(13,19,33,.74);border:1px solid var(--line);border-radius:10px;padding:7px 11px;max-width:min(58%,320px);backdrop-filter:blur(3px)}
  .eralabel .e{color:var(--teal);font-weight:700;font-size:12.5px}.eralabel .n{color:var(--dim);font-size:11px;margin-top:3px;line-height:1.4}
  #miniWrap{position:absolute;right:10px;bottom:10px;background:rgba(13,19,33,.8);border:1px solid var(--line);border-radius:10px;padding:6px;backdrop-filter:blur(3px)}
  #mini{display:block;border-radius:6px;cursor:pointer}

  aside{width:330px;flex:none;border-left:1px solid #0a0f1a;background:#0d1422 url("./assets/ui_panel.jpg") center/100% 100% no-repeat;display:flex;flex-direction:column;min-height:0}
  .meters{padding:11px 14px;border-bottom:1px solid var(--line);display:grid;grid-template-columns:1fr 1fr;gap:7px 20px;align-content:start}
  .meter .top{display:flex;justify-content:space-between;align-items:baseline;font-size:11px;color:var(--dim);margin-bottom:3px}.meter .top b{color:var(--ink);font-variant-numeric:tabular-nums;font-size:12px}
  .bar{height:6px;border-radius:999px;background:#0d1424;overflow:hidden}.bar>i{display:block;height:100%;border-radius:999px;transition:width .5s cubic-bezier(.4,0,.2,1)}
  .tabbar{display:flex;gap:5px;padding:10px 14px 0}
  .tab{flex:1;text-align:center;cursor:pointer;font-size:11.5px;font-weight:700;letter-spacing:.4px;padding:8px 4px;border:1px solid var(--line);border-bottom:none;border-radius:9px 9px 0 0;background:#121b2e;color:var(--dim);transition:.12s}
  .tab.sel{background:#1b2a44;color:var(--teal);border-color:var(--teal-dim)}
  .scroll{flex:1;overflow:auto;padding:13px 14px}
  .sect{font-size:10.5px;letter-spacing:.7px;color:var(--teal);font-weight:800;margin:2px 0 8px;text-transform:uppercase}
  .row{display:flex;gap:7px;margin-bottom:9px;flex-wrap:wrap}
  .rowlab{font-size:9.5px;letter-spacing:.5px;color:var(--slate);font-weight:700;width:100%;margin-bottom:-3px}
  .iconbtn{position:relative;width:52px;height:52px;border:none;border-radius:12px;background:var(--btn) center/100% 100% no-repeat;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .1s,filter .1s;flex:none}
  .iconbtn:hover{transform:translateY(-2px);filter:brightness(1.13)}
  .iconbtn.sel{background:var(--btnon) center/100% 100% no-repeat;filter:drop-shadow(0 0 9px rgba(63,224,208,.55))}
  .iconbtn.lock{filter:grayscale(.9) brightness(.5);cursor:not-allowed}
  .iconbtn.lock:hover{transform:none}
  .iconbtn img{width:29px;height:29px;object-fit:contain;pointer-events:none;filter:drop-shadow(0 1px 2px rgba(0,0,0,.55))}
  .iconbtn .badge{position:absolute;bottom:-5px;right:-5px;background:var(--amber);color:#1a1205;font-size:9.5px;font-weight:800;border-radius:999px;padding:1px 5px;border:1px solid #0e1422}
  .iconbtn .badge.free{background:var(--slate);color:#0e1422}
  .iconbtn .lk{position:absolute;top:3px;right:5px;font-size:11px}
  .divider{height:1px;background:var(--line);margin:12px 0}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .pchip{display:flex;align-items:center;gap:6px;border:1px solid var(--teal-dim);background:#13302e;border-radius:999px;padding:4px 10px 4px 5px;font-size:11.5px}
  .pchip img{width:16px;height:16px}
  .muted{font-size:11.5px;color:var(--dim);line-height:1.5}
  /* tech node */
  .tech{display:flex;gap:9px;align-items:center;border:1px solid var(--line);background:var(--panel2);border-radius:11px;padding:8px 10px;margin-bottom:7px;cursor:pointer;transition:.12s}
  .tech:hover{border-color:var(--teal-dim)}
  .tech.done{border-color:var(--teal);background:#13302e}
  .tech.cant{opacity:.55}
  .tech .ti{width:38px;height:38px;flex:none;border-radius:9px;background:var(--btn) center/100% 100% no-repeat;display:flex;align-items:center;justify-content:center}
  .tech .ti img{width:24px;height:24px}
  .tech .tx{flex:1;min-width:0}
  .tech .tn{font-size:12.5px;font-weight:700}
  .tech .td{font-size:10.5px;color:var(--dim);line-height:1.3}
  .tech .tc{font-size:11px;font-weight:800;color:var(--amber);white-space:nowrap;display:flex;align-items:center;gap:3px}
  .tech .tc img{width:14px;height:14px}
  .tech.done .tc{color:var(--teal)}
  .tiergroup{margin-bottom:12px}
  .tierhead{font-size:10.5px;letter-spacing:.6px;color:var(--slate);font-weight:800;margin:4px 0 6px;text-transform:uppercase}
  /* leaderboard */
  .lb{border:1px solid var(--line);border-radius:11px;padding:9px 11px;margin-bottom:7px;background:var(--panel2)}
  .lb.you{border-color:var(--teal);background:#13302e}
  .lb .lh{display:flex;justify-content:space-between;align-items:baseline}
  .lb .nm{font-size:13px;font-weight:700}.lb .sc{font-size:15px;font-weight:900;color:var(--teal);font-variant-numeric:tabular-nums}
  .lb .st{font-size:10.5px;color:var(--dim);margin:1px 0 4px}
  .lb .ms{font-size:10px;color:var(--dim);font-variant-numeric:tabular-nums}

  .runwrap{padding:10px 12px;border-top:1px solid var(--line)}
  .run{width:100%;padding:12px;border-radius:12px;border:1px solid #5ee9da;font-size:15px;font-weight:800;letter-spacing:1px;text-transform:uppercase;cursor:pointer;background:linear-gradient(180deg,#48e6d6,#1d8c84);color:#04201d;transition:.15s;box-shadow:0 3px 0 #0c4d48,0 0 16px rgba(63,224,208,.35),inset 0 1px 0 rgba(255,255,255,.35)}
  .run:disabled{filter:grayscale(.7) brightness(.7);cursor:not-allowed}
  .run:not(:disabled):hover{filter:brightness(1.08)}
  .log{font-size:11.5px;color:var(--dim);margin-top:8px;min-height:16px;line-height:1.45}.log b{font-variant-numeric:tabular-nums}

  #tip{position:fixed;z-index:60;max-width:230px;background:#0c1322;border:1px solid var(--teal-dim);border-radius:9px;padding:8px 10px;pointer-events:none;display:none;box-shadow:0 10px 30px rgba(0,0,0,.5)}
  #tip b{display:block;font-size:12.5px;color:var(--ink);margin-bottom:2px}#tip span{font-size:11px;color:var(--dim);line-height:1.4}
  #helpBtn{width:28px;height:28px;border-radius:50%;border:1px solid var(--line);background:var(--panel2);color:var(--dim);font-weight:800;font-size:14px;cursor:pointer;transition:.12s}
  #helpBtn:hover{border-color:var(--teal);color:var(--teal)}
  #langBtn{height:28px;min-width:34px;padding:0 9px;border-radius:999px;border:1px solid var(--line);background:var(--panel2);color:var(--dim);font-weight:800;font-size:12px;cursor:pointer;transition:.12s}
  #langBtn:hover{border-color:var(--teal);color:var(--teal)}
  #muteBtn{width:28px;height:28px;border-radius:50%;border:1px solid var(--line);background:var(--panel2);font-size:13px;cursor:pointer;transition:.12s;line-height:1}
  #muteBtn:hover{border-color:var(--teal)}
  #tourBlock{position:fixed;inset:0;z-index:79;display:none}
  #tourBlock.show{display:block}
  #tourHole{position:fixed;display:none;border-radius:12px;border:2px solid var(--teal);box-shadow:0 0 0 9999px rgba(6,10,18,.74),0 0 18px rgba(63,224,208,.5);z-index:80;pointer-events:none;transition:all .25s cubic-bezier(.4,0,.2,1)}
  #tourHole.show{display:block}
  #tourBubble{position:fixed;display:none;z-index:81;max-width:300px;background:#0c1322;border:1px solid var(--teal-dim);border-radius:13px;padding:14px 16px;box-shadow:0 18px 50px rgba(0,0,0,.6)}
  #tourBubble.show{display:block}
  #tourText{font-size:13px;line-height:1.5;color:var(--ink)}
  #tourNav{display:flex;align-items:center;gap:7px;margin-top:13px}
  #tourNav .tg{flex:1}
  #tourStep{font-size:11px;color:var(--slate);font-variant-numeric:tabular-nums}
  #tourNav button{cursor:pointer;border:1px solid var(--line);background:var(--panel2);color:var(--ink);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700}
  #tourNav button:hover{border-color:var(--teal-dim)}
  #tourNav button.prim{background:linear-gradient(180deg,#48e6d6,#1d8c84);color:#04201d;border-color:#5ee9da}
  #objective{position:absolute;left:50%;top:10px;transform:translateX(-50%);z-index:3;background:rgba(13,19,33,.8);border:1px solid var(--line);border-radius:999px;padding:5px 14px;font-size:11.5px;color:var(--dim);backdrop-filter:blur(3px);max-width:62%;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(18px);z-index:70;max-width:min(460px,92vw);background:#0c1322;border:1px solid var(--teal-dim);border-radius:12px;padding:12px 16px;font-size:12.5px;line-height:1.5;color:var(--ink);box-shadow:0 14px 40px rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:.35s cubic-bezier(.4,0,.2,1)}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(6,10,18,.74);backdrop-filter:blur(4px);z-index:40}
  .modal.show{display:flex}
  .card{background:#0d1422 url("./assets/ui_panel.jpg") center/100% 100% no-repeat;border:1px solid #0a0f1a;border-radius:18px;max-width:580px;width:100%;padding:26px;box-shadow:0 30px 80px rgba(0,0,0,.6);max-height:92vh;overflow:auto}
  .card h1{margin:0;font-size:30px;letter-spacing:2px}.card h1 b{color:var(--teal)}
  .card .tag{color:var(--amber);font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
  .card p{color:var(--dim);line-height:1.55;font-size:13.5px}
  .card .cover{width:100%;border-radius:12px;border:1px solid var(--line);margin:6px 0 14px;display:block}
  .choices{display:flex;flex-direction:column;gap:10px;margin-top:14px}
  .choice{text-align:left;cursor:pointer;border:1px solid var(--line);background:var(--panel2);color:var(--ink);border-radius:12px;padding:13px 15px;font-size:14px;font-weight:600;transition:.13s}
  .choice:hover{border-color:var(--teal);background:#1b2a44}
  .big{font-size:52px;font-weight:900;color:var(--teal);text-align:center;line-height:1}
  .grade{text-align:center;font-size:22px;font-weight:800;margin:2px 0 4px}
  .rank{text-align:center;font-size:13px;color:var(--amber);margin-bottom:6px}
  .endmeters{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;margin:14px 0}
  .em{display:flex;justify-content:space-between;font-size:13px;border-bottom:1px dashed var(--line);padding:4px 0}.em b{font-variant-numeric:tabular-nums}
  .learnbox{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-top:14px}.learnbox .h{color:var(--teal);font-size:12px;font-weight:700;margin-bottom:5px}.learnbox p{margin:0;font-size:12.5px}
  .center{text-align:center;margin-top:16px}
  #debug .card{max-width:430px}
  .dbar{margin:9px 0}.dbar .t{display:flex;justify-content:space-between;font-size:12px;color:var(--dim);margin-bottom:3px}.dbar .t b{color:var(--ink)}
  .dline{height:10px;border-radius:6px;background:#0d1424;overflow:hidden}.dline>i{display:block;height:100%;border-radius:6px}
  .why{font-size:13px;line-height:1.5;margin-top:12px;padding:11px 13px;border-radius:10px}
  .why.bias{background:#2a1620;border:1px solid #5e2b3a;color:#ffc9d2}.why.ok{background:#13261f;border:1px solid #2c5440;color:#bfe9cf}
  .fix{font-size:12.5px;color:var(--teal);margin-top:9px}

  @media (max-width:860px){
    main{flex-direction:column}aside{width:auto;border-left:none;border-top:1px solid var(--line);max-height:50%}
    #stage{min-height:240px}.brand{font-size:15px}header{gap:6px;padding:6px 10px}
    #mini{width:104px!important;height:104px!important}
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">ALGO<b>POLIS</b></div>
    <div class="hgrow"></div>
    <div id="resStrip" style="display:flex;gap:7px;flex-wrap:wrap"></div>
    <div class="pill" id="cyclePill"></div>
    <div class="pill" id="eraPill"></div>
    <button id="muteBtn" title="Sound"></button>
    <button id="langBtn" title="Language / 언어"></button>
    <button id="helpBtn" title="Tutorial">?</button>
  </header>
  <main>
    <div id="stage">
      <div id="bg3d"></div>
      <canvas id="c"></canvas><div id="dev"></div>
      <div id="cam3d">
        <button id="camRotL" title="Rotate left">⟲</button>
        <button id="camRotR" title="Rotate right">⟳</button>
        <button id="camIn" title="Zoom in">＋</button>
        <button id="camOut" title="Zoom out">－</button>
        <button id="camHome" title="Reset view">⌂</button>
      </div>
      <div id="miniWrap"><canvas id="mini" width="150" height="150"></canvas></div>
      <div class="eralabel" id="eraLabel"><div class="e"></div><div class="n"></div></div>
      <div id="objective"></div>
    </div>
    <aside>
      <div class="meters" id="meters"></div>
      <div class="tabbar" id="tabbar"></div>
      <div class="scroll" id="panel"></div>
      <div class="runwrap"><button class="run" id="runBtn"></button><div class="log" id="log"></div></div>
    </aside>
  </main>
</div>
<div id="tip"></div>
<div id="toast"></div>
<div id="tourBlock"></div>
<div id="tourHole"></div>
<div id="tourBubble"><div id="tourText"></div><div id="tourNav"><span id="tourStep"></span><div class="tg"></div><button id="tourSkip"></button><button id="tourBack"></button><button id="tourNext" class="prim"></button></div></div>

<div class="modal show" id="intro"><div class="card">
  <div class="tag" id="introTag"></div><h1>ALGO<b>POLIS</b></h1>
  <img class="cover" src="./assets/cover.png" alt="ALGOPOLIS">
  <div id="introBody"></div><p style="color:var(--amber)" id="introTip"></p>
  <div class="center"><button class="run" id="startBtn" style="width:auto;padding:13px 30px"></button></div>
</div></div>
<div class="modal" id="event"><div class="card">
  <div class="tag" id="evTag"></div><h1 style="font-size:22px;letter-spacing:1px" id="evTitle"></h1>
  <p id="evText"></p><div class="choices" id="evChoices"></div>
</div></div>
<div class="modal" id="debug"><div class="card">
  <div class="tag" id="dbgTag"></div><div id="dbgBody"></div>
  <div class="center"><button class="run" id="dbgClose" style="width:auto;padding:10px 24px;margin-top:14px"></button></div>
</div></div>
<div class="modal" id="end"><div class="card">
  <div class="tag" id="endTag"></div><div class="big" id="endScore"></div>
  <div class="grade" id="endGrade"></div><div class="rank" id="endRank"></div>
  <div class="endmeters" id="endMeters"></div><p id="endVerdict"></p>
  <div class="learnbox"><div class="h" id="learnH"></div><p id="learnP"></p></div>
  <div class="learnbox" id="conceptsBox" style="display:none"><div class="h" id="conceptsTitle"></div><div id="conceptsList"></div></div>
  <div class="center"><button class="run" id="againBtn" style="width:auto;padding:13px 30px"></button></div>
</div></div>

<script src="./assets/three.min.js"></script>
<script type="module">
import { STR } from "./strings.js";
let lang="en"; try{lang=localStorage.getItem("algopolis_lang")||((navigator.language||"en").startsWith("ko")?"ko":"en");}catch(e){}
const T=()=>STR[lang]||STR.en;

/* ---- procedural Web Audio (no assets) ---- */
const AUDIO={ctx:null,master:null,muted:false,padOn:false};
try{AUDIO.muted=localStorage.getItem("algopolis_muted")==="1";}catch(e){}
function audioInit(){if(AUDIO.ctx)return;try{AUDIO.ctx=new (window.AudioContext||window.webkitAudioContext)();AUDIO.master=AUDIO.ctx.createGain();AUDIO.master.gain.value=AUDIO.muted?0:0.55;AUDIO.master.connect(AUDIO.ctx.destination);}catch(e){}}
function blip(freq,dur,type,vol,when,glideTo){if(!AUDIO.ctx||AUDIO.muted)return;const t=AUDIO.ctx.currentTime+(when||0);
  const o=AUDIO.ctx.createOscillator(),g=AUDIO.ctx.createGain();o.type=type||"sine";o.frequency.setValueAtTime(freq,t);
  if(glideTo)o.frequency.exponentialRampToValueAtTime(glideTo,t+dur);
  g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(vol||0.3,t+0.012);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g);g.connect(AUDIO.master);o.start(t);o.stop(t+dur+0.03);}
function snd(name){if(!AUDIO.ctx||AUDIO.muted)return;switch(name){
  case "click": blip(420,0.06,"triangle",0.16); break;
  case "select": blip(560,0.08,"triangle",0.18); blip(840,0.06,"sine",0.1,0.03); break;
  case "build": blip(300,0.12,"square",0.14); blip(460,0.12,"triangle",0.12,0.04); break;
  case "research": [523,659,784].forEach((f,i)=>blip(f,0.14,"triangle",0.14,i*0.06)); break;
  case "run": blip(170,0.5,"sawtooth",0.14,0,440); [440,554,660].forEach((f,i)=>blip(f,0.3,"sine",0.09,0.1+i*0.05)); break;
  case "event": blip(330,0.18,"square",0.16); blip(247,0.22,"square",0.14,0.12); break;
  case "victory": [523,659,784,1047].forEach((f,i)=>blip(f,0.42,"triangle",0.18,i*0.1)); break;
  case "collapse": [400,300,220,150].forEach((f,i)=>blip(f,0.36,"sawtooth",0.16,i*0.1)); break;
  case "error": blip(150,0.18,"square",0.18,0,110); break;
}}
function setMute(m){AUDIO.muted=m;try{localStorage.setItem("algopolis_muted",m?"1":"0");}catch(e){}
  if(AUDIO.master)AUDIO.master.gain.value=m?0:0.55;const b=$("muteBtn");if(b)b.textContent=m?"🔇":"🔊";}
let _padTimer=null;
function startPad(){if(AUDIO.padOn||!AUDIO.ctx)return;AUDIO.padOn=true;const c=AUDIO.ctx;
  const pg=c.createGain();pg.gain.value=0.11;pg.connect(AUDIO.master);
  const lp=c.createBiquadFilter();lp.type="lowpass";lp.frequency.value=580;lp.connect(pg);
  [110,146.83].forEach((f,i)=>{const o=c.createOscillator();o.type="sine";o.frequency.value=f;o.detune.value=i?7:-7;const g=c.createGain();g.gain.value=0.5;o.connect(g);g.connect(lp);o.start();});
  const lfo=c.createOscillator();lfo.frequency.value=0.05;const lg=c.createGain();lg.gain.value=230;lfo.connect(lg);lg.connect(lp.frequency);lfo.start();
  const scale=[440,523.25,587.33,659.25,783.99];
  _padTimer=setInterval(()=>{if(AUDIO.muted||!AUDIO.ctx)return;if(Math.random()<0.6)blip(scale[Math.floor(Math.random()*scale.length)],1.3,"triangle",0.05);},2600);}

/* rng: random seed per game (deterministic within a game) */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
let seed=12345, rng=mulberry32(seed); const rnd=(a,b)=>a+(b-a)*rng();

};

  t_history:"in_history",t_risk:"lg_risk",t_equal:"lg_equal",t_aid:"aid",t_federated:"federated",t_explain:"explain",t_audit:"audit"};

];
const EVENTS={

};
const POOL=["ev_panopole","ev_aequa","ev_leak","ev_surplus","ev_protest","ev_vendor","ev_whistle","ev_proxy","ev_automation"];

let tiles,meters,res,cycle,era,ended,unlocked,selected,tool,rivals,accord,evSeen,mlShown,autoShown,concepts;

function reset(){
  seed=(Math.floor(Math.random()*1e9))>>>0; rng=mulberry32(seed);
  meters={efficiency:55,welfare:50,fairness:60,trust:60,transparency:56};
  res={budget:22,data:4,insight:4,unrest:10};
  cycle=1;era=0;ended=false;
  unlocked=new Set(); selected={input:null,logic:null,action:null}; tool="residential";
  rivals=NAT.map(n=>({key:n.key,m:{...n.t}})); accord=false;
  evSeen=new Set(); mlShown=autoShown=false; concepts=new Set();
  tiles=[];for(let gy=0;gy<GRID;gy++)for(let gx=0;gx<GRID;gx++)tiles.push({gx,gy,zone:null,level:1,trueNeed:0,recorded:0,served:0});
  const c=6;
  placeZone(tileAt(c,c),"civic",true);placeZone(tileAt(c-1,c),"residential",true);placeZone(tileAt(c,c-1),"industrial",true);
  placeZone(tileAt(c+1,c),"residential",true);placeZone(tileAt(c-1,c-1),"data",true);
}
const tileAt=(gx,gy)=>tiles[gy*GRID+gx];
const built=()=>tiles.filter(t=>t.zone);
const clamp=(v,a=0,b=100)=>Math.max(a,Math.min(b,v));
function placeZone(t,z,free){const zi=ZONES[z];if(!free){if(res.budget<zi.cost)return false;res.budget-=zi.cost;}
  t.zone=z;t.level=1;t.trueNeed=clamp(zi.base+rnd(-8,8));t.recorded=clamp(t.trueNeed+zi.rec+rnd(-5,5));t.served=22+rnd(-4,4);return true;}
function upgradeCost(t){return 3*t.level;}
function blockUnlocked(id){if(STARTER.includes(id))return true;for(const k of unlocked){const b=TECH[k].blocks;if(b&&b.includes(id))return true;}return false;}
function hasPolicy(p){return unlocked.has(POLICY_OF[p]);}
function recomputeEra(){let e=0;unlocked.forEach(k=>e=Math.max(e,TECH[k].era));era=e;}

/* allocation helpers */
function dataVal(t,i){if(i==="in_requests")return t.trueNeed;if(i==="in_history")return t.recorded;if(i==="in_income")return ZONES[t.zone].wealth;if(i==="in_sensors")return clamp(t.recorded*0.7+(t.zone==="industrial"?20:t.zone==="residential"?12:4));return 50;}
function weightOf(t,i,l){const dv=dataVal(t,i);if(l==="lg_risk")return Math.pow(Math.max(1,dv),2);if(l==="lg_under")return Math.max(2,t.trueNeed-t.served);if(l==="lg_equal")return 100;if(l==="lg_cost")return Math.max(2,120-t.trueNeed);return 1;}
const neigh=t=>[[1,0],[-1,0],[0,1],[0,-1]].map(([dx,dy])=>{const x=t.gx+dx,y=t.gy+dy;return (x>=0&&y>=0&&x<GRID&&y<GRID)?tileAt(x,y):null;}).filter(Boolean);

function runCycle(){
  if(ended)return; const i=selected.input,l=selected.logic,a=selected.action; const B=built();
  if(!i||!l||!a||!B.length)return;
  pulse=1;snd("run");tourCheck("run");
  // resource production
  let dataInc=1,insInc=2,budInc=0,upkeep=0;
  B.forEach(t=>{const zi=ZONES[t.zone];budInc+=zi.income*t.level;upkeep+=0.5*t.level;
    if(t.zone==="data")dataInc+=3; if(t.zone==="civic"){insInc+=1.5;dataInc+=0.3;}});
  // adjacency
  let trustAdj=0,unrestAdj=0,fairAdj=0;
  for(const t of B){for(const n of neigh(t)){if(!n.zone)continue;
    if(t.zone==="civic"&&n.zone==="residential"){trustAdj+=0.6;insInc+=0.2;}
    if(t.zone==="industrial"&&n.zone==="residential"){unrestAdj+=1.1;fairAdj-=0.5;}
    if(t.zone==="data"&&n.zone==="civic"){dataInc+=0.6;}}}
  // allocation across map
  const pool=8+B.length*1.5+era*2+Math.min(18,res.data*0.1)+(hasPolicy("means_aid")?6:0);
  const w=B.map(t=>weightOf(t,i,l)); const sw=w.reduce((s,x)=>s+x,0)||1; const GAIN=3,DECAY=6;
  B.forEach((t,n)=>{let alloc=pool*(w[n]/sw); if(hasPolicy("means_aid"))alloc+=Math.max(0,(t.trueNeed-t.served))*0.05;
    t.served=clamp(t.served+alloc*GAIN-DECAY*t.level);
    t.trueNeed=clamp(t.trueNeed+1*t.level);
    const repair=(l==="lg_under"||l==="lg_equal")&&(i==="in_requests");
    const drop=hasPolicy("federated")?2:4;
    if(t.served<t.trueNeed*0.5)t.recorded=clamp(t.recorded-drop); else if(repair)t.recorded=clamp(t.recorded+Math.sign(t.trueNeed-t.recorded)*5);});
  // aggregate meters
  const cov=B.map(t=>t.served/Math.max(1,t.trueNeed));const meanCov=cov.reduce((s,x)=>s+x,0)/cov.length;
  const spread=Math.sqrt(cov.reduce((s,x)=>s+(x-meanCov)**2,0)/cov.length);const meanServed=B.reduce((s,t)=>s+t.served,0)/B.length;
  const effBonus={lg_risk:22,lg_cost:24,lg_equal:4,lg_under:-2}[l]+({in_history:6,in_sensors:6,in_income:4,in_requests:-2}[i]);
  const welfareT=clamp(meanCov*90),fairnessT=clamp(100-spread*170),effT=clamp(meanServed*0.5+effBonus+30);
  meters.welfare=clamp(meters.welfare+(welfareT-meters.welfare)*0.6+(hasPolicy("means_aid")?3:0)+fairAdj*0.3);
  let fairDelta=(fairnessT-meters.fairness)*0.6+(hasPolicy("means_aid")?3:0)+fairAdj;
  if(hasPolicy("audit"))fairDelta=Math.max(fairDelta,-3);
  meters.fairness=clamp(meters.fairness+fairDelta);
  meters.efficiency=clamp(meters.efficiency+(effT-meters.efficiency)*0.6);
  const transDelta=({in_requests:2,in_history:-3,in_income:-1,in_sensors:-2}[i])+(l==="lg_equal"?1:0)+(hasPolicy("explainability")?4:0);
  meters.transparency=clamp(meters.transparency+transDelta);
  const surveil=a==="ac_patrol"?2:0;const trustDelta=({ac_service:2,ac_budget:1,ac_patrol:-2}[a])+(meters.fairness-50)*0.06-(res.unrest>60?2:0);
  const trustShock=(era===2&&meters.transparency<45)?3:0;
  meters.trust=clamp(meters.trust+trustDelta-trustShock);
  // unrest
  let unrestDelta=unrestAdj+(meters.fairness<45?3:0)+(meters.trust<45?2:0)-(meters.welfare>70?3:0)-2;
  res.unrest=clamp(res.unrest+unrestDelta);
  if(res.unrest>70)meters.trust=clamp(meters.trust-2);
  // resources
  res.budget=Math.max(0,res.budget+budInc+Math.round(meters.efficiency/25)-Math.round(upkeep));
  res.data=clamp(res.data+dataInc,0,999); res.insight=clamp(res.insight+insInc,0,999);
  // rivals evolve
  rivals.forEach(r=>{const tg=NAT.find(n=>n.key===r.key).t;METERS.forEach(k=>{r.m[k]=clamp(r.m[k]+(tg[k]-r.m[k])*0.08+rnd(-2,2));});});
  cycle++; postLog(welfareT,fairnessT,effT,unrestDelta);
  runDebrief(welfareT,fairnessT,effT,unrestDelta);
  spawnFlow();
  // collapse fail
  if(meters.trust<25||res.unrest>=95){ endGame("collapse"); return; }
  if(cycle>8){ endGame(); return; }
  refreshHUD();
  // events: guaranteed era dilemmas, else random draw
  if(era>=1&&!mlShown){mlShown=true;showEvent("ev_ml");}
  else if(era>=2&&!autoShown){autoShown=true;showEvent("ev_auto");}
  else if(rng()<0.55){const avail=POOL.filter(e=>!evSeen.has(e));if(avail.length)showEvent(avail[Math.floor(rng()*avail.length)]);}
}

/* events (ev_ml / ev_auto have meter effects defined inline) */
const SPECIAL={ml:{a:{efficiency:6,fairness:-9,transparency:-2,unrest:4},b:{transparency:8,fairness:7,efficiency:-4}},
               auto:{a:{efficiency:5,trust:-9,transparency:-10,unrest:5},b:{transparency:12,trust:8,efficiency:-5}}};
function showEvent(id){
  const t=T(); let txt,eff; snd("event");
  if(id==="ev_ml"){txt=t.events.ev_ml;eff=SPECIAL.ml;} else if(id==="ev_auto"){txt=t.events.ev_auto;eff=SPECIAL.auto;}
  else {txt=t.events[id];eff=EVENTS[id];evSeen.add(id);}
  $("evTag").textContent=t.eventTag;$("evTitle").textContent=txt.title;$("evText").textContent=txt.text;
  $("evChoices").innerHTML="";
  ["a","b"].forEach(opt=>{const b=document.createElement("button");b.className="choice";b.textContent=txt[opt];
    b.onclick=()=>{applyEff(eff[opt]);hide("event");refreshHUD();};$("evChoices").appendChild(b);});
  show("event");
}
function applyEff(e){if(!e)return;for(const k in e){if(k==="accord"){accord=true;continue;}
  if(METERS.includes(k))meters[k]=clamp(meters[k]+e[k]); else if(RES.includes(k))res[k]=Math.max(0,res[k]+e[k]);}}

const harm=m=>{const v=METERS.map(k=>Math.max(1,m[k]));return Math.round(5/v.reduce((s,x)=>s+1/x,0));};
function endGame(force){
  ended=true; const t=T(); const score=harm(meters);
  const board=[{name:t.world.you,s:score,you:true},...rivals.map(r=>({name:t.nations[r.key].name,s:harm(r.m)}))].sort((a,b)=>b.s-a.s);
  const rank=board.findIndex(x=>x.you)+1;
  let path;
  if(force==="collapse"||meters.trust<25||res.unrest>=95)path="collapse";
  else if(METERS.every(k=>meters[k]>=62))path="just";
  else if(unlocked.size>=7&&meters.transparency>=65)path="innovator";
  else if(rank===1)path="hegemon";
  else if(meters.fairness<42&&meters.efficiency>=68)path="tyrant";
  else path="steward";
  const P=t.paths[path]; snd(path==="collapse"?"collapse":"victory");
  $("endTag").textContent=t.endTitle;$("endScore").textContent=score;
  $("endGrade").textContent=P.name;$("endGrade").style.color=(path==="just"||path==="hegemon"||path==="innovator")?"var(--teal)":(path==="collapse"||path==="tyrant")?"var(--bad)":"var(--amber)";
  $("endRank").textContent=t.rankLine.replace("{k}",rank).replace("{n}",board.length);
  $("endMeters").innerHTML=METERS.map(k=>`<div class="em"><span style="color:${MCOLOR[k]}">${t.meters[k]}</span><b>${Math.round(meters[k])}</b></div>`).join("");
  $("endVerdict").textContent=P.verdict;$("learnH").textContent=t.learn;$("learnP").textContent=t.learnBody;$("againBtn").textContent=t.again;
  const cb=$("conceptsBox");
  if(concepts&&concepts.size){cb.style.display="";$("conceptsTitle").textContent=t.conceptsTitle;$("conceptsList").innerHTML=[...concepts].map(c=>`<div style="font-size:12px;color:var(--dim);margin:3px 0;line-height:1.4">• ${t.concepts[c]}</div>`).join("");}else cb.style.display="none";
  show("end");
}

  if(!t0.zone){$("dbgBody").innerHTML=`<p>${t.debug.empty}</p>`;$("dbgClose").textContent=t.debug.close;show("debug");return;}
  const row=(L,val,c)=>`<div class="dbar"><div class="t"><span>${L}</span><b>${Math.round(val)}</b></div><div class="dline"><i style="width:${clamp(val)}%;background:${c}"></i></div></div>`;
  let html=row(t.debug.trueNeed,t0.trueNeed,"var(--wel)")+row(t.debug.recorded,t0.recorded,"var(--trust)")+row(t.debug.served,t0.served,"var(--teal)");
  const i=selected.input,l=selected.logic;const src=i?t.blocks[i].name:"—",rule=l?t.blocks[l].name:"—";

  else html+=`<div class="why ok">${t.debug.fairok}</div>`;
  $("dbgBody").innerHTML=html;$("dbgClose").textContent=t.debug.close;show("debug");
}

/* DOM */
const $=id=>document.getElementById(id);const show=id=>$(id).classList.add("show");const hide=id=>$(id).classList.remove("show");
const tip=$("tip");
function showTip(el){const n=el.dataset.tname;if(!n)return;tip.innerHTML=`<b>${n}</b><span>${el.dataset.tdesc||""}</span>`;tip.style.display="block";
  const r=el.getBoundingClientRect();let x=r.left+r.width/2-tip.offsetWidth/2,y=r.top-tip.offsetHeight-8;x=Math.max(8,Math.min(innerWidth-tip.offsetWidth-8,x));if(y<8)y=r.bottom+8;tip.style.left=x+"px";tip.style.top=y+"px";}
function hideTip(){tip.style.display="none";}
function wireTip(el){el.addEventListener("mouseenter",()=>showTip(el));el.addEventListener("mouseleave",hideTip);el.addEventListener("pointerdown",e=>{if(e.pointerType==="touch"){showTip(el);clearTimeout(el._tt);el._tt=setTimeout(hideTip,2200);}});}

function buildMeters(){const t=T();$("meters").innerHTML=METERS.map(k=>`<div class="meter" data-tname="${t.meters[k]}" data-tdesc="${t.meterHelp[k].replace(/"/g,'&quot;')}"><div class="top"><span>${t.meters[k]}</span><b id="m_${k}">0</b></div><div class="bar"><i id="b_${k}" style="background:${MCOLOR[k]}"></i></div></div>`).join("");$("meters").querySelectorAll(".meter").forEach(wireTip);}
function buildResStrip(){const t=T();$("resStrip").innerHTML=RES.map(k=>`<div class="res ${k}" data-tname="${t.resources[k]}" data-tdesc="${t.resHelp[k].replace(/"/g,'&quot;')}"><img data-icon="${RESICON[k]}" alt="${t.resources[k]}"><b id="r_${k}">0</b></div>`).join("");
  $("resStrip").querySelectorAll(".res").forEach(wireTip);}

function iconBtnHTML(kind,id,name,desc,iconKey,opts){opts=opts||{};

  const badge=opts.badge!==undefined?`<span class="badge ${opts.badge===0?'free':''}">${opts.badge===0?'★':opts.badge}</span>`:"";

function renderPanel(){

    h+=`<div class="sect">${t.buildLabel}</div><div class="row" id="tools">`;
    for(const z of Object.keys(ZONES))h+=iconBtnHTML("zone",z,t.zones[z],t.zoneDesc[z],ZONES[z].img,{badge:ZONES[z].cost,sel:tool===z});
    h+=iconBtnHTML("tool","upgrade",t.upgrade.name,t.upgrade.desc,"audit",{sel:tool==="upgrade"});
    h+=iconBtnHTML("tool","inspect",t.inspect.name,t.inspect.desc,"inspect",{badge:0,sel:tool==="inspect"});
    h+=`</div><div class="muted">${t.placeHint}</div>`;
  } else if(tab==="govern"){
    const grp=(slot,arr)=>{let s=`<div class="row"><div class="rowlab">${t.slots[slot]}</div>`;
      for(const id of arr){const u=blockUnlocked(id);s+=iconBtnHTML(slot,id,t.blocks[id].name,u?t.blocks[id].desc:t.locked,id,{lock:!u,sel:selected[slot]===id});}return s+`</div>`;};
    h+=`<div class="sect">${t.governLabel}</div>`+grp("input",BLOCKS.input)+grp("logic",BLOCKS.logic)+grp("action",BLOCKS.action);
    h+=`<div class="divider"></div><div class="sect">${t.policiesLabel}</div>`;
    const pols=Object.keys(POLICY_OF).filter(hasPolicy);
    if(!pols.length)h+=`<div class="muted">${t.noPolicy}</div>`;
    else{h+=`<div class="chips">`+pols.map(p=>`<span class="pchip" data-tname="${t.policies[p].name}" data-tdesc="${t.policies[p].desc.replace(/"/g,'&quot;')}"><img data-icon="${TECH_ICON[POLICY_OF[p]]}">${t.policies[p].name}</span>`).join("")+`</div>`;}
  } else if(tab==="research"){
    h+=`<div class="sect">${t.research.label}</div>`;
    for(let e=0;e<3;e++){h+=`<div class="tiergroup"><div class="tierhead">${t.research.tiers[e]}</div>`;
      for(const id of Object.keys(TECH)){if(TECH[id].era!==e)continue;const tc=TECH[id];const done=unlocked.has(id);const can=res.insight>=tc.cost;
        h+=`<div class="tech ${done?'done':''} ${(!done&&!can)?'cant':''}" data-tech="${id}">
          <div class="ti"><img data-icon="${TECH_ICON[id]}"></div>
          <div class="tx"><div class="tn">${t.techs[id].name}</div><div class="td">${t.techs[id].desc} <span style="color:var(--teal)">(${t.techs[id].un})</span></div></div>
          <div class="tc">${done?'✓ '+t.research.done:`<img data-icon="insight">${tc.cost}`}</div></div>`;}
      h+=`</div>`;}

  else{bx=r.left;by=r.top-bh-12;}
  bx=Math.max(12,Math.min(innerWidth-bw-12,bx));by=Math.max(12,Math.min(innerHeight-bh-12,by));b.style.left=bx+"px";b.style.top=by+"px";}
function endTour(){tourI=-1;$("tourHole").classList.remove("show");$("tourBubble").classList.remove("show");$("tourBlock").classList.remove("show");$("tourBlock").style.pointerEvents="auto";try{localStorage.setItem("algopolis_onboarded","1");}catch(e){}}
function startTour(){setTab("build");showStep(0);}
function tourCheck(action){if(tourI>=0&&TOUR[tourI]&&TOUR[tourI].do===action){const n=tourI+1;setTimeout(()=>{if(tourI>=0)showStep(n);},380);}}
$("helpBtn").onclick=startTour;$("tourSkip").onclick=endTour;$("tourBack").onclick=()=>showStep(Math.max(0,tourI-1));$("tourNext").onclick=()=>{if(tourI>=TOUR.length-1)endTour();else showStep(tourI+1);};
addEventListener("resize",()=>{if(tourI>=0)showStep(tourI);});
addEventListener("keydown",e=>{if(e.code==="Space"&&!$("runBtn").disabled){e.preventDefault();runCycle();}});
(async function(){const qs=new URLSearchParams(location.search);
  if(qs.has("lang")&&STR[qs.get("lang")])lang=qs.get("lang");
  applyLangStatic();newGame();$("langBtn").textContent=lang==="ko"?"EN":"한";await loadAssets();resize();
  if(qs.has("nointro"))hide("intro");
  if(qs.has("tab")){tab=qs.get("tab");renderPanel();}
  if(qs.has("ev"))showEvent(qs.get("ev"));
  if(qs.has("az"))azim=parseFloat(qs.get("az"));
  if(qs.has("po"))polar=parseFloat(qs.get("po"));
  if(qs.has("tour"))startTour();
  if(qs.has("tourstep")){startTour();showStep(parseInt(qs.get("tourstep"))||0);}
  if(qs.has("endtest"))endGame(qs.get("endtest")||undefined);})();
</script>
